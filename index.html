<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reglab</title>
    <style>
      /* Pre-hydration skeleton styles */
      body, html { margin: 0; padding: 0; height: 100%; background-color: #0A0A0A; font-family: system-ui, -apple-system, sans-serif; }
      #pre-hydrate-skeleton {
        display: flex; flex-direction: column; height: 100vh; width: 100%; background-color: #0A0A0A; color: #EDEDED; overflow: hidden;
      }
      .skel-header-1 { flex-shrink: 0; height: 2.25rem; border-bottom: 1px solid #1A1A1A; background-color: #0A0A0A; }
      .skel-header-2 { flex-shrink: 0; height: 2.25rem; border-bottom: 1px solid #1F1F1F; background-color: #0A0A0A; }
      .skel-main { flex: 1; padding: 0.75rem; display: grid; grid-template-columns: 1fr; gap: 0.75rem; overflow: hidden; }
      @media (min-width: 1024px) { .skel-main { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
      .skel-panel { background-color: #0C0C0C; border: 1px solid #1F1F1F; border-radius: 0.125rem; display: flex; flex-direction: column; overflow: hidden; }
      .skel-panel-header { height: 2.25rem; display: flex; align-items: center; gap: 0.5rem; padding: 0 0.75rem; border-bottom: 1px solid #1F1F1F; }
      .skel-panel-icon-placeholder { width: 14px; height: 14px; background-color: #4A4A4A; border-radius: 2px; }
      .skel-panel-title { font-size: 12px; font-weight: 500; color: #A1A1A1; }
      .skel-panel-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; gap: 0.5rem; }
      .skel-icon-box { width: 3.5rem; height: 3.5rem; border: 1px solid #1F1F1F; background-color: #111111; border-radius: 9999px; display: flex; align-items: center; justify-content: center; margin-bottom: 1.25rem; }
      .skel-icon-placeholder { width: 1.5rem; height: 1.5rem; background-color: #4A4A4A; border-radius: 4px; }
      .skel-pulse-1 { height: 1rem; width: 10rem; background-color: #161616; border-radius: 0.125rem; animation: skel-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
      .skel-pulse-2 { height: 0.75rem; width: 14rem; background-color: #101010; border-radius: 0.125rem; animation: skel-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; margin-top: 0.5rem; margin-bottom: 1.5rem; }
      .skel-btn-box { height: 2.25rem; width: 8rem; background-color: #1C1C1C; border-radius: 0.125rem; animation: skel-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
      .skel-footer { flex-shrink: 0; height: 1.5rem; display: flex; align-items: center; justify-content: space-between; padding: 0 0.75rem; background-color: #0A0A0A; border-top: 1px solid #1F1F1F; font-size: 11px; color: #6E6E6E; position: relative; }
      .skel-footer-left { display: flex; align-items: center; gap: 0.375rem; }
      .skel-dot { width: 0.375rem; height: 0.375rem; background-color: #2F81F7; border-radius: 9999px; animation: skel-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
      .skel-progress-container { position: absolute; left: 0; right: 0; top: -2px; height: 2px; background-color: #0F0F0F; overflow: hidden; }
      .skel-progress-bar { height: 100%; width: 33.333333%; background-color: #2F81F7; animation: bootslide 1200ms ease-in-out infinite; }
      @keyframes skel-pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
      @keyframes bootslide { 0% { transform: translateX(-100%); } 100% { transform: translateX(400%); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="pre-hydrate-skeleton">
        <div class="skel-header-1"></div>
        <div class="skel-header-2"></div>
        <main class="skel-main">
          <section class="skel-panel">
            <header class="skel-panel-header">
              <div class="skel-panel-icon-placeholder"></div>
              <span class="skel-panel-title">Practicum schedule</span>
            </header>
            <div class="skel-panel-body">
              <div class="skel-icon-box"><div class="skel-icon-placeholder"></div></div>
              <div class="skel-pulse-1"></div>
              <div class="skel-pulse-2"></div>
              <div class="skel-btn-box" style="width: 14rem"></div>
            </div>
          </section>
          <section class="skel-panel">
            <header class="skel-panel-header">
              <div class="skel-panel-icon-placeholder"></div>
              <span class="skel-panel-title">Document History</span>
            </header>
            <div class="skel-panel-body">
              <div class="skel-icon-box"><div class="skel-icon-placeholder"></div></div>
              <div class="skel-pulse-1"></div>
              <div class="skel-pulse-2"></div>
              <div class="skel-btn-box"></div>
            </div>
          </section>
        </main>
        <footer class="skel-footer">
          <div class="skel-progress-container">
            <div class="skel-progress-bar"></div>
          </div>
          <span class="skel-footer-left">
            <span class="skel-dot"></span>
            <span style="color: #A1A1A1">Loading workspace…</span>
          </span>
          <span>Reglab Copilot</span>
        </footer>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
